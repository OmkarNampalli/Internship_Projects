apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-actions-deployment
  labels:
    app: actions-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: node-demo-app
        image: omkarnampalli/actions-demo-app
        ports:
        - containerPort: 3000
